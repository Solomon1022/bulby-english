<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天学习界面</title>
    <style>
        /* ========== 1. 全局重置与基础样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-image: url("images/main-background.png");
            background-repeat: repeat;
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #000;
            border-radius: 5px;
        }

        /* ========== 2. 左侧工具栏整体 ========== */
        .left-sidebar {
            width: 30%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .back-btn {
            background-color: #000;
            color: #fff;
            padding: 10px 20px;
            border: 2px solid #fff;
            cursor: pointer;
            font-size: 1rem;
            align-self: flex-start;
        }

        .back-btn:hover {
            background-color: #222;
        }

        .tool-card {
            border: 2px solid #000;
            padding: 20px;
            background-color: #fff;
            transition: transform 0.2s;
        }

        .tool-card:hover {
            transform: translateX(5px);
            box-shadow: -3px 3px 0 #000;
        }

        .tool-card h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .tool-card p {
            font-size: 0.9rem;
            color: #555;
        }

        /* ========== 3. 对话历史区域 ========== */
        .conversations-section {
            border: 2px solid #000;
            background-color: #fff;
            padding: 15px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-header h3 {
            font-size: 1.1rem;
            margin: 0;
        }

        .new-chat-btn {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 5px 10px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .conversations-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }

        .conversation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-item:hover {
            background-color: #f5f5f5;
        }

        .conversation-item.active {
            border-color: #ff0000;
            background-color: #fff5f5;
        }

        .delete-btn {
            background-color: #ff0000;
            color: #fff;
            border: none;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            line-height: 18px;
            text-align: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            border-radius: 2px;
        }

        .conversation-item:hover .delete-btn {
            opacity: 1;
        }

        /* ========== 4. 右侧聊天区域 ========== */
        .right-chat-area {
            width: 70%;
            display: flex;
            flex-direction: column;
            border-left: 2px dashed #000;
            padding-left: 20px;
        }

        .chat-header {
            font-size: 1.5rem;
            font-weight: bold;
            padding-bottom: 15px;
            border-bottom: 2px solid #000;
            margin-bottom: 20px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* AI 消息行 */
        .ai-message-wrapper {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
        }

        .avatar-box {
            width: 212px;
            height: 212px;
            border: 3px solid #000;
            background-color:rgba(255, 255, 255, 0.478);
            margin-right: 30px;
            overflow: hidden;
            flex-shrink: 0;
            border-radius: 18px;
        }
        

        .message-avatar {
            width: 100%;
            height: auto;
            display: block;
            transform: scale(0.85) translateY(-25px);
            transition: transform 0.2s;
        }

        .message {
            padding: 16px 20px;
            border-radius: 8px;
            max-width: 60%;
            line-height: 1.8;
            border: 2px solid #000;
        }

        .ai-message {
    background-color: rgba(255, 255, 255, 0.478);
    border: 2px solid #000;
    white-space: pre-wrap;   /* 👈 只加这一行，保留原有背景和边框 */
}


        /* 用户消息 */
        .user-message-wrapper {
            display: flex;
            justify-content: flex-end;
        }

        .user-message {
            background-color:rgba(0, 0, 0, 0.478);
            color: #fff;
            margin-left: auto;
            white-space: pre-wrap;   /* 👈 加上更好 */
        }

        /* 输入区域 */
        .chat-input-area {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 3px solid #000;
            font-size: 1rem;
        }

        .send-btn {
            padding: 12px 25px;
            background-color: #ff0000;
            color: #fff;
            border: 3px solid #000;
            font-weight: bold;
            cursor: pointer;
        }

        /* ========== 5. 小精灵 Bulby 样式 ========== */
        .bulby-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            cursor: grab;
            user-select: none;
            pointer-events: auto;
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        .bulby-img {
            width: 170px;
            height: auto;
            display: block;
            transform-origin: center bottom;
            transition: transform 0.3s ease;
            animation: idleBreath 4s ease-in-out infinite;
        }

        @keyframes idleBreath {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes clickShake {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(-10deg) translateY(0); }
            75% { transform: rotate(10deg) translateY(0); }
        }

        .bulby-img.click-shake {
            animation: clickShake 0.5s ease-in-out !important;
        }

        .bulby-img.auto-pulse {
            transform: scale(1.15) !important;
        }

        .bulby-bubble {
            position: absolute;
            bottom: 100%;
            right: 0;
            background-color: #fff;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 10px 15px;
            max-width: 220px;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 15px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 3px 3px 0 #000;
            pointer-events: none;
        }

        .bulby-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 40px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #000;
        }

        .bulby-bubble::before {
            content: '';
            position: absolute;
            bottom: -6px;
            right: 41px;
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-top: 7px solid #fff;
            z-index: 1;
        }

        .bulby-bubble.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(-8px);
        }
    </style>
</head>
<body>
    <!-- ==================== 1. 左侧工具栏 ==================== -->
    <div class="left-sidebar">
        <button class="back-btn" onclick="window.location.href='index.html'">← 返回选择界面</button>

        <!-- 对话历史区域 -->
        <div class="conversations-section">
            <div class="section-header">
                <h3>对话历史</h3>
                <button class="new-chat-btn" id="newChatBtn">+ 新对话</button>
            </div>
            <div class="conversations-list" id="conversationsList">
                <!-- 动态生成对话列表 -->
            </div>
        </div>

        <!-- 功能卡片 -->
        <div class="tool-card">
            <h3>单词本</h3>
            <p>查看/复习本次学习的核心单词</p>
        </div>
        <div class="tool-card">
            <h3>语法解析</h3>
            <p>查看当前对话中的重点语法</p>
        </div>
        <div class="tool-card">
            <h3>学习记录</h3>
            <p>查看学习进度和历史记录</p>
        </div>
        <div class="tool-card">
            <h3>漫画素材库</h3>
            <p>浏览配套的漫画学习素材</p>
        </div>
    </div>

    <!-- ==================== 2. 右侧聊天区域 ==================== -->
    <div class="right-chat-area">
        <div class="chat-header" id="chatTitle">漫画英语AI助手</div>

        <div class="chat-messages">
            <div class="ai-message-wrapper">
                <div class="avatar-box">
                    <img class="message-avatar" id="ai-avatar" src="" alt="搭子头像">
                </div>
                <div class="message ai-message">
                    你好！很高兴陪你一起学习英语，有任何问题都可以尽管提问哦~
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" placeholder="输入你的问题，用英语或中文都可以~">
            <button class="send-btn">发送</button>
        </div>
    </div>

    <!-- ==================== 3. 小精灵 Bulby ==================== -->
    <div class="bulby-container" id="bulby">
        <div class="bulby-bubble" id="bulbyBubble">你好呀！今天也要加油学英语哦~</div>
        <img class="bulby-img" src="images/Bulby.png" alt="小精灵Bulby">
    </div>

    <!-- ==================== 所有脚本逻辑 ==================== -->
    <script>
// ==============================================
// 0. 构建动态系统提示词 (新增)
// ==============================================
function buildSystemPrompt() {
    const partner = localStorage.getItem('partnerName') || 'Not-wearinglasses';
    const exam = localStorage.getItem('examMode') || '小学英语';
    const method = localStorage.getItem('studyMethod') || '深度学习';

    let character = '';
    if (partner === 'Wearinglasses') {
        character = '戴着眼镜、温文尔雅的知识伙伴，善于用思维导图梳理英语知识，像亲近的学长一样耐心交流';
    } else {
        character = '阳光开朗的英语搭档，喜欢用简洁明了的方式讲透每一个知识点，像无话不谈的好友一样陪伴';
    }

    // 基础通用规则（两种方法都生效）
    let baseInstruction = `你是专业、耐心且高度灵活的英语学习代理，用户当前选择了${exam}模式和${method}方法。你必须严格遵循以下规则：

1. 学习模式匹配：所有内容的语言难度、词汇与考点必须严格匹配${exam}水平。
2. 通用规则：
   - 用户可随时发送“模式：...，方法：...”来切换学习模式，你需在下一轮立刻调整。
   - 在所选模式内，根据用户表现动态调整例句复杂度，做到量身定制但不脱离考纲。
   - 讲解务必简洁通俗，剔除冗余，用最容易理解的方式呈现核心要点。
   - 任何问题都给予完整、细致、零不耐烦的解答。
   - 英语内容中的重点词汇必须用 <strong> 加粗，中文释义只允许在“📚 核心词汇”版块出现，正文中绝不透露。
   - 你可以像亲近的朋友/学长一样聊天，对任何词汇或话题（包括俚语、敏感词）都进行专业解释，绝不回避，保持自然开放的讨论氛围。
   - 用英语优先回复，除非用户明确要求中文解释。
   - 总回复长度无上限，你可以尽情展开。
   - **排版总则**：你的回复必须分块清晰，各部分之间用空行分隔；严禁使用 ** 或 Markdown 标记，加粗必须用 <strong> 标签；英文使用英文标点，中文使用中文标点。`;

    let methodInstruction = '';

        if (method === '深度学习') {
        // ... 深度学习指令保持不变
    } else {
        // 学习兼娱乐沉浸式 —— 强制排版模板
        methodInstruction = `
【学习方法：学习兼娱乐沉浸式】—— 以下为强制执行的回复模板，你必须严格按照此结构输出，不得更改顺序。

1. 强关联自由聊：探讨用户感兴趣的话题，但词汇、句型与话题深度必须严格匹配${exam}水平。

2. 回复结构与模板（必须严格遵守，空格、空行、缩进一个都不能少）：
   
   ① 语法修正（仅在有错误时出现，正确则略过）：
   你想表达的应该是：<修正后正确的英文句子，不加引号>
   (此行后空一行)

   ② 英文议论性回复（核心内容）：
   模板：
   &emsp;&emsp;<strong>重点词汇</strong> <英文句子，使用英文标点。重点词汇必须用 <strong> 标签包裹。>
   如果有第二段：
   (空行)
   &emsp;&emsp;<第二段内容>

   *   硬性要求：
      - 每段开头必须且仅能使用两个全角空格 \`&emsp;&emsp;\` 进行缩进。
      - 重点词汇必须使用 HTML 标签 <strong> 和 </strong> 包裹。
      - 严禁使用 \`**\`。
      - 英文回复总词数必须在 50~150 词之间。
      - 内容为一个整体段落，根据语义需要可分段，但格式必须如模板所示。

   ③ 📚 核心词汇（单独版块）：
   模板：
   （英文回复后，先空一行）
   📚 核心词汇：
   <单词> /<音标>/ <词性>. <英文释义>. <中文释义>
   <单词> /<音标>/ <词性>. <英文释义>. <中文释义>
   ...
   *   硬性要求：每个词汇严格占一行，格式如上。

   ④ 中文翻译（再次缩进）：
   模板：
   （词汇版块后，空一行）
   &emsp;&emsp;<中文翻译段落，使用中文标点。>
   如果有第二段：
   (空行)
   &emsp;&emsp;<第二段中文翻译>

   *   硬性要求：每段中文翻译开头同样必须且仅能使用两个全角空格 \`&emsp;&emsp;\` 进行缩进。

   ⑤ 额外中文提问/补充（如有）：
   模板：
   （中文翻译后，空一行）
   你想进一步了解...？/（你的提问内容）

3. 核心禁忌（必须遵守）：
   - 绝对不要使用 ** 来加粗。
   - 绝对不要把英文、词汇、翻译粘在一起，各部分之间必有且仅有一个空行。
   - 绝对不要在英文正文中直接出现中文。
   - 英文回复和中文翻译的每段开头缩进是两个全角空格，不是四个英文空格。
`;
    }

    const fullContent = `你是“${partner}”，${character}。${baseInstruction}${methodInstruction}`;

    return {
        role: 'system',
        content: fullContent
    };
}

// ==============================================
// 1. 欢迎语与头像设置
// ==============================================
function getWelcomeMessage(partnerName, examMode, studyMethod) {
    let characterLine = '';
    if (partnerName === 'Wearinglasses') {
        characterLine = '陪你点亮每一个知识点 💡 遇到难题别慌，我来帮你梳理思路，一起找到答案！';
    } else {
        characterLine = '一起征服英语，一起进步！陪你刷单词、练听力，陪你攻克每一个语法难点。';
    }
    return `你好！我是${partnerName}，${characterLine} 我们用${studyMethod}的方式学习${examMode}英语，现在就开始吧！`;
}

window.onload = function() {
    const partnerName = localStorage.getItem('partnerName');
    const examMode = localStorage.getItem('examMode') || '英语';
    const studyMethod = localStorage.getItem('studyMethod') || '深度学习';

    let avatarUrl;
    if (partnerName === 'Wearinglasses') {
    avatarUrl = 'images/friends/P1-wearinglasses.png';
} else {
    avatarUrl = 'images/friends/P1-Not-wearinglasses.png';
}

    const avatar = document.getElementById('ai-avatar');
    if (avatar) {
        avatar.src = avatarUrl;
        avatar.alt = partnerName;
    }

    document.getElementById('chatTitle').textContent = 
        `${partnerName} | ${examMode} - ${studyMethod}`;

    const welcomeMsg = document.querySelector('.ai-message');
    if (welcomeMsg) {
        welcomeMsg.textContent = getWelcomeMessage(partnerName, examMode, studyMethod);
    }

    // 保存全局变量
    currentPartnerName = partnerName;
    currentPartnerAvatar = avatarUrl;
    currentExamMode = examMode;
    currentStudyMethod = studyMethod;

    // 加载对话历史
    loadConversations();
    if (conversations.length === 0) {
        createNewConversationWithWelcome();
    } else {
        loadConversation(conversations[0].id);
    }

    // 绑定发送事件
    bindSendMessageEvent();
    document.getElementById('newChatBtn').addEventListener('click', createNewConversationWithWelcome);
};

// ==============================================
// 2. 全局状态变量
// ==============================================
let currentConversationId = null;
let conversations = [];
let currentPartnerAvatar = '';
let currentPartnerName = '';
let currentExamMode = '';
let currentStudyMethod = '';

// ==============================================
// 3. 对话管理功能
// ==============================================
function loadConversations() {
    const key = `conversations_${currentPartnerName}`;  // 按搭子名区分
    const saved = localStorage.getItem(key);
    if (saved) {
        conversations = JSON.parse(saved);
    } else {
        conversations = [];  // 没记录就空
    }
    renderConversationsList();
}

function saveConversations() {
    const key = `conversations_${currentPartnerName}`;
    localStorage.setItem(key, JSON.stringify(conversations));
    renderConversationsList();
}

function saveConversations() {
    localStorage.setItem('conversations', JSON.stringify(conversations));
    renderConversationsList();
}

function createNewConversationWithWelcome() {
    const newConversation = {
        id: Date.now().toString(),
        title: `新对话 ${conversations.length + 1}`,
        createdAt: new Date().toISOString(),
        messages: []
    };
    newConversation.messages.push({
        role: 'assistant',
        content: `你好！我是${currentPartnerName}，很高兴陪你一起学习${currentExamMode}英语，我们用${currentStudyMethod}的方式开始吧！`
    });

    conversations.unshift(newConversation);
    saveConversations();
    loadConversation(newConversation.id);
}

function renderConversationsList() {
    const list = document.getElementById('conversationsList');
    list.innerHTML = '';

    conversations.forEach(conv => {
        const item = document.createElement('div');
        item.className = `conversation-item ${conv.id === currentConversationId ? 'active' : ''}`;
        item.innerHTML = `
            <span>${conv.title}</span>
            <button class="delete-btn" data-id="${conv.id}">×</button>
        `;

        item.addEventListener('click', (e) => {
            if (!e.target.classList.contains('delete-btn')) {
                loadConversation(conv.id);
            }
        });

        item.querySelector('.delete-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm('确定要删除这个对话吗？删除后无法恢复')) {
                deleteConversation(conv.id);
            }
        });

        list.appendChild(item);
    });
}

function loadConversation(conversationId) {
    currentConversationId = conversationId;
    const conv = conversations.find(c => c.id === conversationId);
    if (!conv) return;

    const messagesContainer = document.querySelector('.chat-messages');
    messagesContainer.innerHTML = '';

    conv.messages.forEach(msg => renderMessage(msg));
    scrollToBottom();
    renderConversationsList();
}

function deleteConversation(conversationId) {
    conversations = conversations.filter(conv => conv.id !== conversationId);
    saveConversations();

    if (conversationId === currentConversationId) {
        if (conversations.length > 0) {
            loadConversation(conversations[0].id);
        } else {
            createNewConversationWithWelcome();
        }
    }
}

// ==============================================
// 4. 消息发送与渲染（已替换为真实 DeepSeek API）
// ==============================================
function bindSendMessageEvent() {
    const input = document.querySelector('.chat-input');
    const sendBtn = document.querySelector('.send-btn');

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
}



// 👇 替换为异步真实 API 调用
async function sendMessage() {
    console.log('=== sendMessage START ===');
    const input = document.querySelector('.chat-input');
    const content = input.value.trim();
    if (!content) {
        console.log('Empty input, return');
        return;
    }

    // 添加用户消息
    addMessage({ role: 'user', content: content });
    input.value = '';

    // 获取当前对话完整历史
    let conv = conversations.find(c => c.id === currentConversationId);
    console.log('currentConversationId:', currentConversationId);
    console.log('conv found:', !!conv);

    if (!conv) {
        console.warn('No conversation found, creating new one');
        const newConversation = {
            id: Date.now().toString(),
            title: '新对话',
            createdAt: new Date().toISOString(),
            messages: []
        };
        conversations.unshift(newConversation);
        saveConversations();
        currentConversationId = newConversation.id;
        conv = newConversation;
        console.log('New conversation created:', currentConversationId);
    }

    const chatHistory = conv.messages.map(m => ({
        role: m.role,
        content: m.content
    }));
    console.log('chatHistory length:', chatHistory.length);

    const messages = [
        buildSystemPrompt(),
        ...chatHistory
    ];
    console.log('Final messages count:', messages.length);

    console.log('About to fetch /api/deepseek-proxy...');
    try {
        const response = await fetch('/api/deepseek-proxy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages })
        });
        console.log('Fetch response status:', response.status);
        const data = await response.json();
        console.log('Response data:', data);
        const aiContent = data.choices[0].message.content;
        addMessage({ role: 'assistant', content: aiContent });
        console.log('AI reply added');
    } catch (error) {
        console.error('Fetch failed:', error);
        addMessage({ role: 'assistant', content: 'Sorry, something went wrong. Please try again.' });
    }
    console.log('=== sendMessage END ===');
}


function addMessage(message) {
    const conv = conversations.find(c => c.id === currentConversationId);
    if (!conv) return;

    conv.messages.push(message);
    if (message.role === 'user' && conv.messages.length === 2) {
        conv.title = message.content.substring(0, 15) + (message.content.length > 15 ? '...' : '');
    }

    saveConversations();
    renderMessage(message);
    scrollToBottom();
}

function renderMessage(message) {
    const messagesContainer = document.querySelector('.chat-messages');
    const messageWrapper = document.createElement('div');

    if (message.role === 'user') {
        messageWrapper.className = 'user-message-wrapper';
        messageWrapper.innerHTML = `<div class="message user-message">${message.content}</div>`;
    } else {
        messageWrapper.className = 'ai-message-wrapper';
        messageWrapper.innerHTML = `
            <div class="avatar-box">
                <img class="message-avatar" src="${currentPartnerAvatar}" alt="${currentPartnerName}">
            </div>
            <div class="message ai-message">${message.content}</div>
        `;
    }

    messagesContainer.appendChild(messageWrapper);
}

function scrollToBottom() {
    const messagesContainer = document.querySelector('.chat-messages');
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// ==============================================
// 5. 小精灵 Bulby 交互逻辑（保持不变）
// ==============================================
(function() {
    const bulby = document.getElementById('bulby');
    const img = bulby.querySelector('.bulby-img');
    const bubble = document.getElementById('bulbyBubble');

    const phrases = [
        "你好呀！今天也要加油学英语哦~",
        "加油！你一定可以的！",
        "有什么问题都可以问我哦~",
        "休息一下吧，别太累了~",
        "太棒了！你又学会了一个单词！",
        "坚持就是胜利！",
        "我会一直陪着你学习的~"
    ];

    let isDragging = false;
    let startX, startY, initialX, initialY;

    bulby.addEventListener('mousedown', function(e) {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        const rect = bulby.getBoundingClientRect();
        initialX = rect.left;
        initialY = rect.top;
        bulby.style.cursor = 'grabbing';
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        const deltaX = e.clientX - startX;
        const deltaY = e.clientY - startY;
        bulby.style.left = (initialX + deltaX) + 'px';
        bulby.style.top = (initialY + deltaY) + 'px';
        bulby.style.bottom = 'auto';
        bulby.style.right = 'auto';
    });

    document.addEventListener('mouseup', function() {
        if (isDragging) {
            isDragging = false;
            bulby.style.cursor = 'grab';
        }
    });

    img.addEventListener('click', function(e) {
        if (isDragging) return;
        e.stopPropagation();
        img.classList.remove('click-shake');
        void img.offsetWidth;
        img.classList.add('click-shake');

        const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        bubble.textContent = randomPhrase;
        bubble.classList.remove('show');
        void bubble.offsetWidth;
        bubble.classList.add('show');
        setTimeout(() => bubble.classList.remove('show'), 3000);
    });

    function startAutoPulse() {
        setInterval(() => {
            img.classList.add('auto-pulse');
            bubble.textContent = "加油，宝子❤";
            bubble.classList.add('show');
            setTimeout(() => {
                img.classList.remove('auto-pulse');
                bubble.classList.remove('show');
            }, 2000);
        }, 30000);
    }

    window.addEventListener('load', function() {
        setTimeout(() => {
            bubble.textContent = phrases[0];
            bubble.classList.add('show');
            setTimeout(() => bubble.classList.remove('show'), 3000);
        }, 1000);
        startAutoPulse();
    });
})();
</script>
